name: 🔐 Sync GitHub App Webhook Secret 同步 Webhook Secret

on:
  workflow_call:
    inputs:
      github_webhook_secret: { required: false, type: string, default: "" }
  workflow_dispatch:
    inputs:
      github_webhook_secret: { required: true, type: string }

run-name: "🔐 Sync GitHub App Webhook Secret 同步 Webhook Secret"

concurrency:
  group: sync-github-app-webhook-secret-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync-secret:
    name: 🔐 Sync GitHub App Webhook Secret 同步 Webhook Secret
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Sync GitHub secret
        env:
          GH_TOKEN: ${{ secrets.CLAW_SYS_GITHUB_TOKEN }}
          GH_WEBHOOK_SECRET: ${{ inputs.github_webhook_secret || secrets.GH_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          gh secret set GH_WEBHOOK_SECRET --repo "${GITHUB_REPOSITORY}" --body "${GH_WEBHOOK_SECRET}"

      - name: Sync Worker secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_WEBHOOK_SECRET: ${{ inputs.github_webhook_secret || secrets.GH_WEBHOOK_SECRET }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          STORED_WORKER_NAME: ${{ vars.WORKER_NAME }}
          STORED_WORKER_URL: ${{ vars.WORKER_URL }}
          STORED_GITHUBCLAW_WORKER_URL: ${{ vars.GITHUBCLAW_WORKER_URL }}
        run: |
          set -euo pipefail

          source "${GITHUB_WORKSPACE}/.github/workflows/lib/worker-name.sh"

          match_status=0
          worker_name=""
          if worker_name="$(
            resolve_existing_worker_name \
              "${CLOUDFLARE_API_TOKEN}" \
              "${CLOUDFLARE_ACCOUNT_ID}" \
              "${GITHUB_OWNER}" \
              "${GITHUB_REPO}" \
              "${STORED_WORKER_NAME}" \
              "${STORED_WORKER_URL}" \
              "${STORED_GITHUBCLAW_WORKER_URL}"
          )"; then
            echo "✅ Using Worker 使用 Worker：${worker_name}"
          else
            match_status=$?
            if [[ "$match_status" -ne 1 ]]; then
              exit "$match_status"
            fi

            echo "::error::No Worker found to sync the GitHub App secret to. Please re-run deploy-lobster-burger first to backfill WORKER_NAME / WORKER_URL. 找不到可同步的 Worker"
            exit 1
          fi

          printf '%s' "${GITHUB_WEBHOOK_SECRET}" | npx wrangler secret put GITHUB_WEBHOOK_SECRET --name "${worker_name}"
