name: 🧠 更新 LLM API Key

# 由 Core worker 的 /llm Telegram 指令透過 repository_dispatch 觸發：
#   event_type: update-llm-secret
#   client_payload: { provider, secret_name, api_key }
# 把使用者在 Telegram 輸入的 API Key 寫入 repo secret。
# 不需要重新部署 worker —— issue-1.yml 執行任務時直接從 repo secrets 讀取各家 API Key。

on:
  repository_dispatch:
    types: [update-llm-secret]

run-name: "🧠 更新 LLM API Key（${{ github.event.client_payload.provider }}）"

concurrency:
  group: update-llm-secret-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update-secret:
    name: 🧠 更新 LLM API Key
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Update repo secret
        env:
          GH_TOKEN: ${{ secrets.CLAW_SYS_GITHUB_TOKEN }}
          SECRET_NAME: ${{ github.event.client_payload.secret_name }}
          API_KEY: ${{ github.event.client_payload.api_key }}
        run: |
          set -euo pipefail

          # 立刻遮罩，避免 API Key 出現在任何後續 log
          echo "::add-mask::${API_KEY}"

          # secret_name 白名單驗證：僅允許大寫字母/數字/底線，且必須以 _API_KEY 或 _API_TOKEN 結尾
          if [[ ! "${SECRET_NAME}" =~ ^[A-Z0-9_]+_(API_KEY|API_TOKEN)$ ]]; then
            echo "::error::不合法的 secret 名稱：${SECRET_NAME}"
            exit 1
          fi

          if [[ -z "${API_KEY}" ]]; then
            echo "::error::api_key 為空"
            exit 1
          fi

          printf '%s' "${API_KEY}" | gh secret set "${SECRET_NAME}" --repo "${GITHUB_REPOSITORY}"
          echo "✅ 已更新 repo secret：${SECRET_NAME}"

      - name: Publish summary
        env:
          PROVIDER: ${{ github.event.client_payload.provider }}
          SECRET_NAME: ${{ github.event.client_payload.secret_name }}
        run: |
          {
            echo "### 🧠 LLM API Key 更新"
            echo
            echo "| 項目 | 值 |"
            echo "| --- | --- |"
            echo "| Provider | \`${PROVIDER}\` |"
            echo "| Secret | \`${SECRET_NAME}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
