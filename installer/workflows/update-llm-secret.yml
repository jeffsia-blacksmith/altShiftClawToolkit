name: 🧠 Update LLM API Key 更新 LLM API Key

# 由 Core worker 的 /llm Telegram 指令透过 repository_dispatch 触发：
#   event_type: update-llm-secret
#   client_payload: { provider, secret_name, api_key }
# 把使用者在 Telegram 输入的 API Key 写入 repo secret。
# 不需要重新部署 worker —— issue-1.yml 执行任务时直接从 repo secrets 读取各家 API Key。

on:
  repository_dispatch:
    types: [update-llm-secret]

run-name: "🧠 Update LLM API Key 更新 LLM API Key（${{ github.event.client_payload.provider }}）"

concurrency:
  group: update-llm-secret-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update-secret:
    name: 🧠 Update LLM API Key 更新 LLM API Key
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Update repo secret
        env:
          GH_TOKEN: ${{ secrets.CLAW_SYS_GITHUB_TOKEN }}
          SECRET_NAME: ${{ github.event.client_payload.secret_name }}
          API_KEY: ${{ github.event.client_payload.api_key }}
        run: |
          set -euo pipefail

          # 立刻遮罩，避免 API Key 出现在任何后续 log
          echo "::add-mask::${API_KEY}"

          # secret_name 白名单验证：仅允许大写字母/数字/底线，且必须以 _API_KEY 或 _API_TOKEN 结尾
          if [[ ! "${SECRET_NAME}" =~ ^[A-Z0-9_]+_(API_KEY|API_TOKEN)$ ]]; then
            echo "::error::Invalid secret name 不合法的 secret 名称：${SECRET_NAME}"
            exit 1
          fi

          if [[ -z "${API_KEY}" ]]; then
            echo "::error::api_key is empty 为空"
            exit 1
          fi

          printf '%s' "${API_KEY}" | gh secret set "${SECRET_NAME}" --repo "${GITHUB_REPOSITORY}"
          echo "✅ Updated repo secret 已更新 repo secret：${SECRET_NAME}"

      - name: Publish summary
        env:
          PROVIDER: ${{ github.event.client_payload.provider }}
          SECRET_NAME: ${{ github.event.client_payload.secret_name }}
        run: |
          {
            echo "### 🧠 LLM API Key Update 更新"
            echo
            echo "| Item 项目 | Value 值 |"
            echo "| --- | --- |"
            echo "| Provider | \`${PROVIDER}\` |"
            echo "| Secret | \`${SECRET_NAME}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify via Telegram
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ALLOWED_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
          PROVIDER: ${{ github.event.client_payload.provider }}
          SECRET_NAME: ${{ github.event.client_payload.secret_name }}
        run: |
          if [[ -z "${TELEGRAM_BOT_TOKEN}" || -z "${TELEGRAM_CHAT_ID}" ]]; then
            echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is not configured, skipping notification."
            exit 0
          fi

          MSG="✅ *LLM API Key Set Successfully 设定成功*

          Provider 供应商：\`${PROVIDER}\`
          Secret Name 名称：\`${SECRET_NAME}\`

          The key has been written successfully — your Lobster will pick up this setting automatically on its next task run! 金钥已成功写入，您的小龙虾在下一次任务执行时将自动启用此设定！"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg chat_id "${TELEGRAM_CHAT_ID}" --arg text "${MSG}" '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}')"

