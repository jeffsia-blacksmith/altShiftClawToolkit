name: 🧠 Update LLM API Key Update LLM API Key

# Triggered by the Core worker's /llm Telegram command via repository_dispatch:
#   event_type: update-llm-secret
#   client_payload: { provider, secret_name, api_key }
# Writes the API Key the user types in Telegram into a repo secret.
# No need to redeploy the worker — issue-1.yml reads each provider's API Key directly from repo secrets at task time.

on:
  repository_dispatch:
    types: [update-llm-secret]

run-name: "🧠 Update LLM API Key Update LLM API Key(${{ github.event.client_payload.provider }})"

concurrency:
  group: update-llm-secret-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update-secret:
    name: 🧠 Update LLM API Key Update LLM API Key
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Update repo secret
        env:
          GH_TOKEN: ${{ secrets.CLAW_SYS_GITHUB_TOKEN }}
          SECRET_NAME: ${{ github.event.client_payload.secret_name }}
          API_KEY: ${{ github.event.client_payload.api_key }}
        run: |
          set -euo pipefail

          # Mask immediately so the API Key never appears in any subsequent log
          echo "::add-mask::${API_KEY}"

          # secret_name whitelist: only uppercase letters/digits/underscores, must end with _API_KEY or _API_TOKEN
          if [[ ! "${SECRET_NAME}" =~ ^[A-Z0-9_]+_(API_KEY|API_TOKEN)$ ]]; then
            echo "::error::Invalid secret name Invalid secret name: ${SECRET_NAME}"
            exit 1
          fi

          if [[ -z "${API_KEY}" ]]; then
            echo "::error::api_key is empty is empty"
            exit 1
          fi

          printf '%s' "${API_KEY}" | gh secret set "${SECRET_NAME}" --repo "${GITHUB_REPOSITORY}"
          echo "✅ Updated repo secret Updated repo secret: ${SECRET_NAME}"

      - name: Publish summary
        env:
          PROVIDER: ${{ github.event.client_payload.provider }}
          SECRET_NAME: ${{ github.event.client_payload.secret_name }}
        run: |
          {
            echo "### 🧠 LLM API Key Update"
            echo
            echo "| Item Item | Value Value |"
            echo "| --- | --- |"
            echo "| Provider | \`${PROVIDER}\` |"
            echo "| Secret | \`${SECRET_NAME}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify via Telegram
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ALLOWED_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
          PROVIDER: ${{ github.event.client_payload.provider }}
          SECRET_NAME: ${{ github.event.client_payload.secret_name }}
        run: |
          if [[ -z "${TELEGRAM_BOT_TOKEN}" || -z "${TELEGRAM_CHAT_ID}" ]]; then
            echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is not configured, skipping notification."
            exit 0
          fi

          MSG="✅ *LLM API Key Set Successfully Set successfully*

          Provider Provider: \`${PROVIDER}\`
          Secret Name Name: \`${SECRET_NAME}\`

          The key has been written successfully — your Lobster will pick up this setting automatically on its next task run! The key has been written — your Lobster will pick up this setting automatically on its next task run!"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg chat_id "${TELEGRAM_CHAT_ID}" --arg text "${MSG}" '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}')"

