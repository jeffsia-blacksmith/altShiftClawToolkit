name: ⚒️ Deploy Lobster Burger 部署龙虾堡

on:
  workflow_call:
    inputs:
      profile_name: { required: false, type: string, default: "" }
      personality: { required: false, type: string, default: "" }
      claw_sys_github_token: { required: false, type: string, default: "" }
      copilot_github_token: { required: false, type: string, default: "" }
      github_webhook_secret: { required: false, type: string, default: "" }
      cloudflare_api_token: { required: false, type: string, default: "" }
      cloudflare_account_id: { required: false, type: string, default: "" }
      telegram_bot_token: { required: false, type: string, default: "" }
      telegram_webhook_secret: { required: false, type: string, default: "" }
      telegram_chat_id: { required: false, type: string, default: "" }
      telegram_allowed_chat_id: { required: false, type: string, default: "" }
      telegram_allowed_from_id: { required: false, type: string, default: "" }
      gemini_api_key: { required: false, type: string, default: "" }
      felo_api_key: { required: false, type: string, default: "" }
      debug_mode: { required: false, type: string, default: "false" }
      init_github_claw: { required: false, type: string, default: "true" }
  workflow_dispatch:
    inputs:
      profile_name: { required: true, type: string }
      personality: { required: true, type: string }
      claw_sys_github_token: { required: false, type: string, default: "" }
      copilot_github_token: { required: false, type: string, default: "" }
      github_webhook_secret: { required: true, type: string }
      cloudflare_api_token: { required: true, type: string }
      cloudflare_account_id: { required: true, type: string }
      telegram_bot_token: { required: true, type: string }
      telegram_webhook_secret: { required: true, type: string }
      telegram_chat_id: { required: true, type: string }
      telegram_allowed_chat_id: { required: false, type: string, default: "" }
      telegram_allowed_from_id: { required: false, type: string, default: "" }
      gemini_api_key: { required: false, type: string, default: "" }
      felo_api_key: { required: false, type: string, default: "" }
      debug_mode: { required: false, type: string, default: "false" }
      init_github_claw: { required: false, type: string, default: "true" }

run-name: "⚒️ Deploy Lobster Burger 部署龙虾堡"

concurrency:
  group: deploy-lobster-burger-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: ⚒️ Deploy Lobster Burger 部署龙虾堡
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_github_owner: ${{ github.repository_owner }}
      TF_VAR_github_repo: ${{ github.event.repository.name }}
      TF_VAR_claw_sys_github_token: ${{ inputs.claw_sys_github_token || secrets.CLAW_SYS_GITHUB_TOKEN }}
      TF_VAR_github_webhook_secret: ${{ inputs.github_webhook_secret || secrets.GH_WEBHOOK_SECRET }}
      TF_VAR_cloudflare_api_token: ${{ inputs.cloudflare_api_token || secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ inputs.cloudflare_account_id || secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_profile_name: ${{ inputs.profile_name || vars.PROFILE_NAME }}
      TF_VAR_personality: ${{ inputs.personality || vars.PERSONALITY }}
      TF_VAR_telegram_bot_token: ${{ inputs.telegram_bot_token || secrets.TELEGRAM_BOT_TOKEN }}
      TF_VAR_telegram_webhook_secret: ${{ inputs.telegram_webhook_secret || secrets.TELEGRAM_WEBHOOK_SECRET }}
      TF_VAR_telegram_chat_id: ${{ inputs.telegram_chat_id || secrets.TELEGRAM_CHAT_ID }}
      TF_VAR_telegram_allowed_chat_id: ${{ inputs.telegram_allowed_chat_id || inputs.telegram_chat_id || secrets.TELEGRAM_ALLOWED_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
      TF_VAR_telegram_allowed_from_id: ${{ inputs.telegram_allowed_from_id || inputs.telegram_chat_id || secrets.TELEGRAM_ALLOWED_FROM_ID || secrets.TELEGRAM_CHAT_ID }}
      TF_VAR_gemini_api_key: ${{ inputs.gemini_api_key || secrets.GEMINI_API_KEY }}
      TF_VAR_felo_api_key: ${{ inputs.felo_api_key || secrets.FELO_API_KEY }}
      TF_VAR_debug_mode: ${{ (inputs.debug_mode || vars.DEBUG_MODE || 'false') == 'true' }}
      TF_VAR_init_github_claw: ${{ (inputs.init_github_claw || vars.INIT_GITHUB_CLAW || 'true') == 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch and unpack remote worker package
        run: |
          set -euo pipefail

          curl --fail --show-error --silent --location \
            "https://jeffsia-blacksmith.github.io/altShiftClawCore/github-claw-worker-package.zip" \
            --output "${RUNNER_TEMP}/github-claw-worker-package.zip"

          rm -rf "${RUNNER_TEMP}/github-claw-worker-package"
          mkdir -p \
            "${RUNNER_TEMP}/github-claw-worker-package" \
            "${GITHUB_WORKSPACE}/Terraform" \
            "${GITHUB_WORKSPACE}/.github/workflows" \
            "${GITHUB_WORKSPACE}/GitHubClawCore" \
            "${GITHUB_WORKSPACE}/templates"

          unzip -q \
            "${RUNNER_TEMP}/github-claw-worker-package.zip" \
            -d "${RUNNER_TEMP}/github-claw-worker-package"

          # altShiftClawCore 套件仅含 GitHubClawCore/ 与 Terraform/（不含 actions/）；
          # 若未来套件加入 actions/ 才复制，避免不存在时报错。
          if [ -d "${RUNNER_TEMP}/github-claw-worker-package/actions" ]; then
            cp -R \
              "${RUNNER_TEMP}/github-claw-worker-package/actions/." \
              "${GITHUB_WORKSPACE}/.github/workflows/"
          fi
          cp -R \
            "${RUNNER_TEMP}/github-claw-worker-package/Terraform/." \
            "${GITHUB_WORKSPACE}/Terraform/"
          cp -R \
            "${RUNNER_TEMP}/github-claw-worker-package/GitHubClawCore/migrations" \
            "${GITHUB_WORKSPACE}/GitHubClawCore/"
          cp \
            "${RUNNER_TEMP}/github-claw-worker-package/GitHubClawCore/index.js" \
            "${GITHUB_WORKSPACE}/index.js"

      - name: Sync installed templates from altShiftClawToolkit
        run: |
          set -euo pipefail

          TOOLKIT_REPO="https://github.com/jeffsia-blacksmith/altShiftClawToolkit.git"
          TOOLKIT_DIR="${RUNNER_TEMP}/altShiftClawToolkit"
          LOCAL_TEMPLATE_DIR="${GITHUB_WORKSPACE}/templates"

          mkdir -p "${LOCAL_TEMPLATE_DIR}"

          readarray -t INSTALLED_TEMPLATES < <(
            find "${LOCAL_TEMPLATE_DIR}" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort || true
          )

          if [[ "${#INSTALLED_TEMPLATES[@]}" -eq 0 ]]; then
            echo "No installed templates/* detected, skipping altShiftClawToolkit sync. 没有侦测到已安装 templates/*，略过 altShiftClawToolkit 同步。"
            exit 0
          fi

          git clone --depth 1 "$TOOLKIT_REPO" "$TOOLKIT_DIR"

          if [[ ! -d "${TOOLKIT_DIR}/templates" ]]; then
            echo "::error::altShiftClawToolkit is missing a templates directory 目录缺少 templates"
            exit 1
          fi

          readarray -t TOOLKIT_TEMPLATES < <(
            find "${TOOLKIT_DIR}/templates" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort || true
          )

          declare -A TOOLKIT_TEMPLATE_SET
          for template_name in "${TOOLKIT_TEMPLATES[@]}"; do
            TOOLKIT_TEMPLATE_SET["$template_name"]=1
          done

          updated_templates=()
          skipped_templates=()

          for template_name in "${INSTALLED_TEMPLATES[@]}"; do
            if [[ -n "${TOOLKIT_TEMPLATE_SET[$template_name]:-}" ]]; then
              rm -rf "${LOCAL_TEMPLATE_DIR}/${template_name}"
              mkdir -p "${LOCAL_TEMPLATE_DIR}/${template_name}"
              cp -R "${TOOLKIT_DIR}/templates/${template_name}/." \
                "${LOCAL_TEMPLATE_DIR}/${template_name}/"
              updated_templates+=("${template_name}")
            else
              skipped_templates+=("${template_name}")
            fi
          done

          {
            echo "### Template Sync Result (altShiftClawToolkit) 模板同步结果"
            echo ""
            if (( ${#updated_templates[@]} > 0 )); then
              echo "#### Updated Templates 已更新模板"
              for template_name in "${updated_templates[@]}"; do
                echo "- ${template_name}"
              done
              echo ""
            else
              echo "- No installed templates to update this run. 本次无可更新的已安装模板。"
              echo ""
            fi

            if (( ${#skipped_templates[@]} > 0 )); then
              echo "#### Skipped Templates (not in toolkit, treated as custom) 已略过模板"
              for template_name in "${skipped_templates[@]}"; do
                echo "- ${template_name}"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit synced workflows
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TF_VAR_claw_sys_github_token}@github.com/${GITHUB_REPOSITORY}.git"

          git add .github/workflows templates
          if git diff --cached --quiet; then
            echo "No workflow/template changes to commit"
            exit 0
          fi

          git commit -m "chore: sync lobster burger package"
          git push origin HEAD:main

      - name: Sync GitHub settings
        env:
          GH_TOKEN: ${{ inputs.claw_sys_github_token || secrets.CLAW_SYS_GITHUB_TOKEN }}
          PROFILE_NAME: ${{ inputs.profile_name || vars.PROFILE_NAME }}
          PERSONALITY: ${{ inputs.personality || vars.PERSONALITY }}
          DEBUG_MODE: ${{ inputs.debug_mode || vars.DEBUG_MODE || 'false' }}
          INIT_GITHUB_CLAW: ${{ inputs.init_github_claw || vars.INIT_GITHUB_CLAW || 'true' }}
          CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare_api_token || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id || secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLAW_SYS_GITHUB_TOKEN: ${{ inputs.claw_sys_github_token || secrets.CLAW_SYS_GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ inputs.copilot_github_token || secrets.COPILOT_GITHUB_TOKEN || inputs.claw_sys_github_token || secrets.CLAW_SYS_GITHUB_TOKEN }}
          GH_WEBHOOK_SECRET: ${{ inputs.github_webhook_secret || secrets.GH_WEBHOOK_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ inputs.telegram_bot_token || secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ inputs.telegram_webhook_secret || secrets.TELEGRAM_WEBHOOK_SECRET }}
          TELEGRAM_CHAT_ID: ${{ inputs.telegram_chat_id || secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ALLOWED_CHAT_ID: ${{ inputs.telegram_allowed_chat_id || inputs.telegram_chat_id || secrets.TELEGRAM_ALLOWED_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ALLOWED_FROM_ID: ${{ inputs.telegram_allowed_from_id || inputs.telegram_chat_id || secrets.TELEGRAM_ALLOWED_FROM_ID || secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ inputs.gemini_api_key || secrets.GEMINI_API_KEY }}
          FELO_API_KEY: ${{ inputs.felo_api_key || secrets.FELO_API_KEY }}
        run: |
          set -euo pipefail

          gh variable set PROFILE_NAME --body "${PROFILE_NAME}" --repo "${GITHUB_REPOSITORY}"
          gh variable set PERSONALITY --body "${PERSONALITY}" --repo "${GITHUB_REPOSITORY}"
          gh variable set DEBUG_MODE --body "${DEBUG_MODE}" --repo "${GITHUB_REPOSITORY}"
          gh variable set INIT_GITHUB_CLAW --body "${INIT_GITHUB_CLAW}" --repo "${GITHUB_REPOSITORY}"

          for secret_name in \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID \
            CLAW_SYS_GITHUB_TOKEN \
            COPILOT_GITHUB_TOKEN \
            GH_WEBHOOK_SECRET \
            TELEGRAM_BOT_TOKEN \
            TELEGRAM_WEBHOOK_SECRET \
            TELEGRAM_CHAT_ID \
            TELEGRAM_ALLOWED_CHAT_ID \
            TELEGRAM_ALLOWED_FROM_ID
          do
            gh secret set "${secret_name}" --repo "${GITHUB_REPOSITORY}" --body "${!secret_name}"
          done

          for optional_secret in GEMINI_API_KEY FELO_API_KEY
          do
            if [[ -n "${!optional_secret}" ]]; then
              gh secret set "${optional_secret}" --repo "${GITHUB_REPOSITORY}" --body "${!optional_secret}"
            fi
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.7
          terraform_wrapper: false

      - name: Ensure workers.dev subdomain
        id: workers_subdomain
        env:
          DEFAULT_WORKERS_DEV_SUBDOMAIN: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          subdomain="$(
            curl --fail --show-error --silent \
              "https://api.cloudflare.com/client/v4/accounts/${TF_VAR_cloudflare_account_id}/workers/subdomain" \
              -H "Authorization: Bearer ${TF_VAR_cloudflare_api_token}" \
              -H "Content-Type: application/json" \
            | jq -r '.result.subdomain // empty'
          )"

          if [[ -z "${subdomain}" ]]; then
            curl --fail --show-error --silent \
              -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/${TF_VAR_cloudflare_account_id}/workers/subdomain" \
              -H "Authorization: Bearer ${TF_VAR_cloudflare_api_token}" \
              -H "Content-Type: application/json" \
              --data "{\"subdomain\":\"${DEFAULT_WORKERS_DEV_SUBDOMAIN,,}\"}" >/dev/null

            subdomain="${DEFAULT_WORKERS_DEV_SUBDOMAIN,,}"
          fi

          echo "subdomain=${subdomain}" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        working-directory: Terraform
        env:
          TF_VAR_workers_dev_subdomain: ${{ steps.workers_subdomain.outputs.subdomain }}
        run: terraform init

      - name: Resolve existing Worker
        id: worker_reconciliation
        env:
          STORED_WORKER_NAME: ${{ vars.WORKER_NAME }}
          STORED_WORKER_URL: ${{ vars.WORKER_URL }}
          STORED_GITHUBCLAW_WORKER_URL: ${{ vars.GITHUBCLAW_WORKER_URL }}
        run: |
          set -euo pipefail

          source "${GITHUB_WORKSPACE}/.github/workflows/lib/worker-name.sh"

          canonical_worker_name="$(build_canonical_worker_name "${TF_VAR_github_owner}" "${TF_VAR_github_repo}")"
          legacy_worker_name="$(build_legacy_worker_name "${TF_VAR_github_repo}")"

          matched_worker_name=""
          match_status=0
          if matched_worker_name="$(
            resolve_existing_worker_name \
              "${TF_VAR_cloudflare_api_token}" \
              "${TF_VAR_cloudflare_account_id}" \
              "${TF_VAR_github_owner}" \
              "${TF_VAR_github_repo}" \
              "${STORED_WORKER_NAME}" \
              "${STORED_WORKER_URL}" \
              "${STORED_GITHUBCLAW_WORKER_URL}"
          )"; then
            echo "✅ Existing Worker detected 侦测到既有 Worker：${matched_worker_name}"
          else
            match_status=$?
            if [[ "$match_status" -ne 1 ]]; then
              exit "$match_status"
            fi
            echo "ℹ️ No existing Worker found, will create/continue with canonical name 找不到既有 Worker，将使用 canonical 名称建立或接续部署。"
            matched_worker_name=""
          fi

          echo "canonical_worker_name=${canonical_worker_name}" >> "$GITHUB_OUTPUT"
          echo "legacy_worker_name=${legacy_worker_name}" >> "$GITHUB_OUTPUT"
          echo "matched_worker_name=${matched_worker_name}" >> "$GITHUB_OUTPUT"
          echo "worker_name_override=${matched_worker_name}" >> "$GITHUB_OUTPUT"

      - name: Import existing Worker
        if: steps.worker_reconciliation.outputs.matched_worker_name != ''
        working-directory: Terraform
        env:
          TF_VAR_workers_dev_subdomain: ${{ steps.workers_subdomain.outputs.subdomain }}
          TF_VAR_github_claw_worker_name_override: ${{ steps.worker_reconciliation.outputs.worker_name_override }}
        run: |
          set -euo pipefail

          terraform import \
            cloudflare_worker.github_claw \
            "${TF_VAR_cloudflare_account_id}/${TF_VAR_github_claw_worker_name_override}"

      - name: Terraform plan
        working-directory: Terraform
        env:
          TF_VAR_workers_dev_subdomain: ${{ steps.workers_subdomain.outputs.subdomain }}
          TF_VAR_github_claw_worker_name_override: ${{ steps.worker_reconciliation.outputs.worker_name_override }}
        run: terraform plan -out=tfplan

      - name: Terraform apply
        working-directory: Terraform
        env:
          TF_VAR_workers_dev_subdomain: ${{ steps.workers_subdomain.outputs.subdomain }}
          TF_VAR_github_claw_worker_name_override: ${{ steps.worker_reconciliation.outputs.worker_name_override }}
        run: terraform apply -auto-approve tfplan

      - name: Read Terraform outputs
        id: tf_outputs
        working-directory: Terraform
        env:
          TF_VAR_workers_dev_subdomain: ${{ steps.workers_subdomain.outputs.subdomain }}
          TF_VAR_github_claw_worker_name_override: ${{ steps.worker_reconciliation.outputs.worker_name_override }}
        run: |
          set -euo pipefail
          echo "worker_name=$(terraform output -raw github_claw_worker_script_name)" >> "$GITHUB_OUTPUT"
          echo "worker_url=$(terraform output -raw github_claw_worker_url)" >> "$GITHUB_OUTPUT"
          echo "schedules_db_name=$(terraform output -raw schedules_db_name)" >> "$GITHUB_OUTPUT"
          echo "schedules_db_uuid=$(terraform output -raw schedules_db_uuid)" >> "$GITHUB_OUTPUT"

      - name: Generate Wrangler config for migrations
        env:
          SCHEDULES_DB_NAME: ${{ steps.tf_outputs.outputs.schedules_db_name }}
          SCHEDULES_DB_UUID: ${{ steps.tf_outputs.outputs.schedules_db_uuid }}
        run: |
          set -euo pipefail
          {
            printf 'name = "githubclaw-migrations"\n'
            printf 'main = "dist/index.js"\n'
            printf 'compatibility_date = "2026-03-09"\n\n'
            printf '[[d1_databases]]\n'
            printf 'binding = "SCHEDULES_DB"\n'
            printf 'database_name = "%s"\n' "${SCHEDULES_DB_NAME}"
            printf 'database_id = "%s"\n' "${SCHEDULES_DB_UUID}"
          } > "${GITHUB_WORKSPACE}/GitHubClawCore/wrangler.migrations.toml"

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ inputs.cloudflare_api_token || secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ inputs.cloudflare_account_id || secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: GitHubClawCore
          command: d1 migrations apply SCHEDULES_DB --remote --config wrangler.migrations.toml

      - name: Sync GitHubClaw Worker metadata variables
        env:
          GH_TOKEN: ${{ inputs.claw_sys_github_token || secrets.CLAW_SYS_GITHUB_TOKEN }}
          WORKER_NAME: ${{ steps.tf_outputs.outputs.worker_name }}
          WORKER_URL: ${{ steps.tf_outputs.outputs.worker_url }}
          WORKERS_SUBDOMAIN: ${{ steps.workers_subdomain.outputs.subdomain }}
        run: |
          set -euo pipefail
          gh variable set WORKER_NAME --body "${WORKER_NAME}" --repo "${GITHUB_REPOSITORY}"
          gh variable set WORKERS_SUBDOMAIN --body "${WORKERS_SUBDOMAIN}" --repo "${GITHUB_REPOSITORY}"
          gh variable set WORKER_URL --body "${WORKER_URL}" --repo "${GITHUB_REPOSITORY}"
          gh variable set GITHUBCLAW_WORKER_URL --body "${WORKER_URL}" --repo "${GITHUB_REPOSITORY}"

      - name: Wait for Worker health check
        env:
          WORKER_URL: ${{ steps.tf_outputs.outputs.worker_url }}
        run: |
          set -euo pipefail
          echo "⏳ Waiting for Cloudflare Worker health check 等待 Cloudflare Worker health check..."
          MAX_RETRIES=20
          RETRY_INTERVAL=3
          WORKER_ENDPOINT="${WORKER_URL%/}/health"
          last_response=""
          for i in $(seq 1 $MAX_RETRIES); do
            response=""
            if response="$(curl --fail-with-body --show-error --silent --max-time 10 "${WORKER_ENDPOINT}")"; then
              if jq -e '.ok == true and .service == "githubclaw-core"' <<<"${response}" >/dev/null 2>&1; then
                echo "✅ Worker health check passed, took about 通过，耗时约 $(( (i - 1) * RETRY_INTERVAL )) seconds 秒"
                exit 0
              fi
            fi
            last_response="${response:-"(empty response)"}"
            echo "  Attempt 尝试 $i/$MAX_RETRIES: health check not yet passing 尚未通过, retrying in ${RETRY_INTERVAL}s 秒后重试..."
            sleep $RETRY_INTERVAL
          done
          echo "::error::Worker health check failed at ${WORKER_ENDPOINT}. Last response: ${last_response:0:500}"
          exit 1

      - name: Configure Telegram webhook
        env:
          WORKER_URL: ${{ steps.tf_outputs.outputs.worker_url }}
          TELEGRAM_BOT_TOKEN: ${{ inputs.telegram_bot_token || secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ inputs.telegram_webhook_secret || secrets.TELEGRAM_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          response="$(
            curl --fail-with-body --show-error --silent \
              -X POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
              -H "Content-Type: application/json" \
              --data "$(jq -nc \
                --arg url "${WORKER_URL}/telegram/webhook" \
                --arg secret_token "${TELEGRAM_WEBHOOK_SECRET}" \
                '{url: $url, secret_token: $secret_token}')"
          )"

          if [[ "$(echo "${response}" | jq -r '.ok // false')" != "true" ]]; then
            echo "::error::Telegram webhook setup failed 设定失败: $(echo "${response}" | jq -r '.description // "unknown error"')"
            exit 1
          fi

          echo "Setting up Telegram bot commands..."
          # Set English default commands
          cmd_response_en="$(
            curl --silent \
              -X POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setMyCommands" \
              -H "Content-Type: application/json" \
              -d '{"commands":[{"command":"start","description":"🚀 Initialize and view claw list"},{"command":"list","description":"📋 List all active claws"},{"command":"status","description":"📊 Show current claw status summary"},{"command":"current","description":"🦞 Show current active claw"},{"command":"llm","description":"🧠 Setup AI provider and model"},{"command":"skills","description":"🛠️ Install and manage agent skills"},{"command":"templates","description":"📄 Install lobster templates"},{"command":"help","description":"❓ Show usage instructions and help"},{"command":"new","description":"➕ Create a new claw"},{"command":"edit","description":"✏️ Edit current claw"},{"command":"close","description":"🔒 Close current claw"},{"command":"clear","description":"🧹 Clear current claw memory"},{"command":"schedules","description":"⏰ List all schedules"},{"command":"workflow","description":"🔄 Check workflow status"},{"command":"enable","description":"▶️ Enable current claw"},{"command":"disable","description":"⏸️ Disable current claw"},{"command":"autoupdate","description":"⬆️ Update lobster core"},{"command":"version","description":"🏷️ Check core version"}]}'
          )"
          if [[ "$(echo "${cmd_response_en}" | jq -r '.ok // false')" != "true" ]]; then
            echo "::warning::Telegram default (EN) bot commands setup failed 设定失败: $(echo "${cmd_response_en}" | jq -r '.description // "unknown error"')"
          fi

          # Set Chinese (zh) commands
          cmd_response_zh="$(
            curl --silent \
              -X POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setMyCommands" \
              -H "Content-Type: application/json" \
              -d '{"language_code":"zh","commands":[{"command":"start","description":"🚀 初始化并查看小龙虾列表"},{"command":"list","description":"📋 列出所有值班中的小龙虾"},{"command":"status","description":"📊 显示目前小龙虾状态摘要"},{"command":"current","description":"🦞 显示目前值班中的小龙虾"},{"command":"llm","description":"🧠 设定 AI 供应商与模型"},{"command":"skills","description":"🛠️ 安装与管理小龙虾技能"},{"command":"templates","description":"📄 安装小龙虾范本"},{"command":"help","description":"❓ 显示所有指令说明"},{"command":"new","description":"➕ 建立新的小龙虾"},{"command":"edit","description":"✏️ 编辑目前的小龙虾"},{"command":"close","description":"🔒 关闭目前的小龙虾"},{"command":"clear","description":"🧹 清除目前小龙虾的记忆"},{"command":"schedules","description":"⏰ 列出所有排程"},{"command":"workflow","description":"🔄 查询小龙虾任务状态"},{"command":"enable","description":"▶️ 启用目前的小龙虾"},{"command":"disable","description":"⏸️ 停用目前的小龙虾"},{"command":"autoupdate","description":"⬆️ 更新龙虾堡核心"},{"command":"version","description":"🏷️ 查询龙虾堡核心版本"}]}'
          )"
          if [[ "$(echo "${cmd_response_zh}" | jq -r '.ok // false')" != "true" ]]; then
            echo "::warning::Telegram Chinese (ZH) bot commands setup failed 设定失败: $(echo "${cmd_response_zh}" | jq -r '.description // "unknown error"')"
          fi

      - name: Publish summary
        if: always()
        env:
          WORKER_NAME: ${{ steps.tf_outputs.outputs.worker_name }}
          WORKER_URL: ${{ steps.tf_outputs.outputs.worker_url }}
          SCHEDULES_DB_NAME: ${{ steps.tf_outputs.outputs.schedules_db_name }}
          SCHEDULES_DB_UUID: ${{ steps.tf_outputs.outputs.schedules_db_uuid }}
        run: |
          applied_worker_name="${WORKER_NAME:-"-"}"
          worker_url="${WORKER_URL:-"-"}"
          schedules_db_name="${SCHEDULES_DB_NAME:-"-"}"
          schedules_db_uuid="${SCHEDULES_DB_UUID:-"-"}"

          {
            echo "### Deploy Lobster Burger 部署龙虾堡"
            echo
            echo "| Item 项目 | Value 值 |"
            echo "| --- | --- |"
            echo "| Repository | \`${GITHUB_REPOSITORY}\` |"
            echo "| Applied Worker | \`${applied_worker_name}\` |"
            echo "| Worker URL | \`${worker_url}\` |"
            echo "| SCHEDULES_DB | \`${schedules_db_name}\` |"
            echo "| SCHEDULES_DB UUID | \`${schedules_db_uuid}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
