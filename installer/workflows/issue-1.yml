# 这个 workflow 会接手指定 issue，执行 Pi Coding Agent，并把结果回写到 issue comment 与 issue branch。
# 注意：整个流程直接跑在 GitHub Actions runner 上，这份 YAML 本身没有使用 Docker container。
name: '🦞 执行小龙虾任务 #1'

# 支援两种触发方式：
# 1. workflow_dispatch：从 GitHub Actions UI 手动填参数后执行
# 2. repository_dispatch：由外部系统带 payload 呼叫
on:
  # 让人可以手动启动这个 workflow，适合排错或由上游系统代送参数。
  workflow_dispatch:
    inputs:
      # 要处理的 GitHub issue 编号。
      issue_number:
        description: 'GitHub issue number to process'
        required: true
        type: string
      # 可选：若上游已建立进度留言，这里可以直接指定 comment id 来沿用。
      comment_id:
        description: 'Existing issue comment ID to reuse for progress updates'
        required: false
        type: string
      user_comment_id:
        description: 'User issue comment ID used to locate artifacts/{user_comment_id}/user.md'
        required: false
        type: string
      # 可选：触发来源，方便 workflow 内部根据不同来源调整行为或纪录分析用。
      event_source:
        description: 'Who is triggering this workflow: cron or issue'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - cron
          - issue
      event_data:
        description: 'Additional data related to the event that triggered this workflow'
        required: false
        type: string
        default: ''
  # 让外部 dispatcher 用 API 触发这个 workflow。
  repository_dispatch:
    types: [coding-agent]

# Actions UI 上显示的执行名称，会把 issue 编号直接带进来，方便辨识。
run-name: "🦞 执行小龙虾 #${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"

# 避免同一个 repo + issue 同时有多个 agent 执行互相覆盖。
concurrency:
  group: "coding-agent-${{ github.repository }}-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"
  cancel-in-progress: false

# 这个 workflow 需要能推送内容，也需要能建立/更新 issue comment。
permissions:
  contents: write
  issues: write

# 把不同 trigger 的 payload 统一整理成共用环境变数，后续 step 只要读 env 即可。
env:
  # 统一后的 issue 编号。
  ISSUE_NUMBER: "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"
  # 若有提供现成的 comment id，就直接更新那则留言。
  COMMENT_ID: "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.comment_id || inputs.comment_id }}"
  # 这次触发来源的使用者留言 id，用来读取对应的 user.md。
  USER_COMMENT_ID: "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.user_comment_id || inputs.user_comment_id }}"
  CLAW_LANGUAGE: "${{ vars.CLAW_LANGUAGE || 'en' }}"

jobs:
  # 单一主 job：在 GitHub-hosted runner 上完成验证、执行 agent、写回结果。
  run-agent:
    # 直接跑在 Ubuntu runner，不是以 Docker container 执行。
    runs-on: ubuntu-latest
    # 最多允许执行 90 分钟，避免 workflow 无限卡住。
    timeout-minutes: 90

    steps:
      # 把目标 repo 检出到 runner，后面才能切 branch、写档与 push。
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: "issue-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"
          fetch-depth: 1

      # 先把 Node.js 环境准备好，Pi Coding Agent 需要 Node.js 执行。
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 状态更新处理
        if: ${{ (github.event_name == 'repository_dispatch' && github.event.client_payload.event_data == 'StatusUpdate') || inputs.event_data == 'StatusUpdate' }}
        shell: bash
        run: |
          echo "StatusUpdate event detected, performing status update..."

      # 从 .pi/settings.json 读取使用者选择的 provider，并设定对应的 API key 环境变数
      - name: 读取 BYOK 设定
        if: ${{ (github.event_name == 'repository_dispatch' && github.event.client_payload.event_data != 'StatusUpdate') || inputs.event_data != 'StatusUpdate' }}
        shell: bash
        env:
          SECRET_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SECRET_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SECRET_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SECRET_GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SECRET_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SECRET_PIONEER_API_KEY: ${{ secrets.PIONEER_API_KEY }}
          SECRET_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SECRET_OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          # 读取 provider（Pi 原生 provider id）
          PROVIDER="openrouter"
          if [ -f .pi/settings.json ]; then
            PROVIDER=$(jq -r '.defaultProvider // "openrouter"' .pi/settings.json)
          fi

          # 依 provider 设定对应的 Pi 环境变数
          case "$PROVIDER" in
            cloudflare-workers-ai)
              echo "CLOUDFLARE_API_KEY=${SECRET_CLOUDFLARE_API_TOKEN}" >> "$GITHUB_ENV"
              echo "CLOUDFLARE_ACCOUNT_ID=${SECRET_CLOUDFLARE_ACCOUNT_ID}" >> "$GITHUB_ENV"
              ;;
            anthropic)
              echo "ANTHROPIC_API_KEY=${SECRET_ANTHROPIC_API_KEY}" >> "$GITHUB_ENV"
              ;;
            openai)
              echo "OPENAI_API_KEY=${SECRET_OPENAI_API_KEY}" >> "$GITHUB_ENV"
              ;;
            groq)
              echo "GROQ_API_KEY=${SECRET_GROQ_API_KEY}" >> "$GITHUB_ENV"
              ;;
            google)
              echo "GEMINI_API_KEY=${SECRET_GEMINI_API_KEY}" >> "$GITHUB_ENV"
              ;;
            pioneer)
              echo "PIONEER_API_KEY=${SECRET_PIONEER_API_KEY}" >> "$GITHUB_ENV"
              ;;
            openrouter)
              echo "OPENROUTER_API_KEY=${SECRET_OPENROUTER_API_KEY}" >> "$GITHUB_ENV"
              ;;
            ollama-cloud)
              echo "OLLAMA_API_KEY=${SECRET_OLLAMA_API_KEY}" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unknown provider: $PROVIDER"
              exit 1
              ;;
          esac

          echo "PI_PROVIDER=$PROVIDER" >> "$GITHUB_ENV"

      - name: 执行任务
        if: ${{ (github.event_name == 'repository_dispatch' && github.event.client_payload.event_data != 'StatusUpdate') || inputs.event_data != 'StatusUpdate' }}
        id: pi_task
        shell: bash
        env:
          PI_CODING_AGENT_DIR: ".pi"
        run: |
          RAW_ISSUE_NUMBER='${{ env.ISSUE_NUMBER }}'
          RAW_COMMENT_ID='${{ env.COMMENT_ID }}'
          RAW_USER_COMMENT_ID='${{ env.USER_COMMENT_ID }}'

          ISSUE_NUMBER="${RAW_ISSUE_NUMBER%\"}"
          ISSUE_NUMBER="${ISSUE_NUMBER#\"}"
          COMMENT_ID="${RAW_COMMENT_ID%\"}"
          COMMENT_ID="${COMMENT_ID#\"}"
          USER_COMMENT_ID="${RAW_USER_COMMENT_ID%\"}"
          USER_COMMENT_ID="${USER_COMMENT_ID#\"}"

          if [[ -z "$COMMENT_ID" || -z "$USER_COMMENT_ID" ]]; then
            echo "COMMENT_ID or USER_COMMENT_ID is missing"
            exit 1
          fi

          mkdir -p "artifacts/${COMMENT_ID}"

          git fetch origin "issue-${ISSUE_NUMBER}" --depth=1
          git checkout -B "issue-${ISSUE_NUMBER}" "origin/issue-${ISSUE_NUMBER}"

          USER_PROMPT_FILE="artifacts/${USER_COMMENT_ID}/user.md"
          for attempt in {1..10}; do
            if [[ -f "$USER_PROMPT_FILE" ]]; then
              break
            fi
            echo "Waiting for $USER_PROMPT_FILE (attempt ${attempt}/10)"
            git fetch origin "issue-${ISSUE_NUMBER}" --depth=1
            git reset --hard "origin/issue-${ISSUE_NUMBER}"
            sleep 2
          done

          if [[ ! -f "$USER_PROMPT_FILE" ]]; then
            echo "Missing user prompt file: $USER_PROMPT_FILE"
            ls -la artifacts || true
            find artifacts -maxdepth 2 -type f | sort || true
            exit 1
          fi

          USER_PROMPT_CONTENT="$(cat "$USER_PROMPT_FILE")"

          # 固定 Pi Coding Agent 版本，避免 @latest 造成不可重现结果或遭上游 breaking change 影响。
          # 可透过 repo variable PI_CODING_AGENT_VERSION 覆写。
          PI_CODING_AGENT_VERSION='${{ vars.PI_CODING_AGENT_VERSION }}'
          : "${PI_CODING_AGENT_VERSION:=0.70.6}"

          # 若选取 pioneer，则需要先安装 pi-pioneer-provider 延伸模组
          if [[ "${PI_PROVIDER}" == "pioneer" ]]; then
            echo "Installing pi-pioneer-provider extension..."
            npx -y "@mariozechner/pi-coding-agent@${PI_CODING_AGENT_VERSION}" install npm:pi-pioneer-provider
          fi

          # 若选取 ollama-cloud，则需要先安装 pi-ollama-cloud 延伸模组
          if [[ "${PI_PROVIDER}" == "ollama-cloud" ]]; then
            echo "Installing pi-ollama-cloud extension..."
            npx -y "@mariozechner/pi-coding-agent@${PI_CODING_AGENT_VERSION}" install npm:pi-ollama-cloud
          fi

          # Pi 会透过 PI_CODING_AGENT_DIR=.pi 读取 template 内的 settings.json 与 models.json
          # 以 error loglevel 执行，避免 npm warning 污染 error.log
          set +e
          set -o pipefail
          npm_config_loglevel=error npx -y "@mariozechner/pi-coding-agent@${PI_CODING_AGENT_VERSION}" \
            -p "请将最终结果写入 artifacts/${COMMENT_ID}/result.md 。我的提示词为: ${USER_PROMPT_CONTENT}" \
            --mode json \
            2> "artifacts/${COMMENT_ID}/error.log" \
            | jq -c 'select(.type | test("^(session|agent_|turn_|message_start|message_end|tool_|error|result|compaction_|auto_retry_)"))' \
            > "artifacts/${COMMENT_ID}/output.jsonl"
          EXIT_CODE=$?
          set +o pipefail
          set -e

          # Pi 即使遇到 provider 错误也会以 exit 0 结束，需要从 output.jsonl 侦测 errorMessage
          # 侦测到时补写进 error.log 并让本步骤失败，后续的失败处理才会触发
          HAS_ERROR=0
          if jq -e '.. | objects | select((.errorMessage // "") != "")' \
              "artifacts/${COMMENT_ID}/output.jsonl" > /dev/null; then
            jq -r '.. | objects | .errorMessage? // empty' \
              "artifacts/${COMMENT_ID}/output.jsonl" \
              | awk 'NF && !seen[$0]++' \
              >> "artifacts/${COMMENT_ID}/error.log"
            echo "Pi reported errorMessage." >&2
            HAS_ERROR=1
          fi

          # 如果没有产生 result.md，自动从 output.jsonl 或 error.log 撷取 AI 的回覆内容或报错原因做为补救
          if [[ ! -s "artifacts/${COMMENT_ID}/result.md" ]]; then
            echo "Notice: result.md is missing or empty. Attempting intelligent fallback from output.jsonl/error.log..."
            if [[ -f "artifacts/${COMMENT_ID}/output.jsonl" ]]; then
              jq -r 'select(.type == "message_end" or .type == "turn_end" or .type == "result" or .type == "agent_end") | (.message?.content // .content // .text // .result // empty) | if type == "array" then map(select(.type == "text") | .text) | join("\n") elif type == "string" then . else empty end' \
                "artifacts/${COMMENT_ID}/output.jsonl" 2>/dev/null | tail -n 1 > "artifacts/${COMMENT_ID}/result.md" || true
            fi
            if [[ ! -s "artifacts/${COMMENT_ID}/result.md" && -s "artifacts/${COMMENT_ID}/error.log" ]]; then
              echo -e "### ⚠️ 执行提示\n\n产生结果失败，以下为系统排错日志：\n" > "artifacts/${COMMENT_ID}/result.md"
              cat "artifacts/${COMMENT_ID}/error.log" >> "artifacts/${COMMENT_ID}/result.md" || true
            elif [[ ! -s "artifacts/${COMMENT_ID}/result.md" ]]; then
              echo "⚠️ AI 未能返回有意义的文字结果或档案，请检查指令或 API 授权金钥是否已正确设定。" > "artifacts/${COMMENT_ID}/result.md"
            fi
          fi

          if [[ $EXIT_CODE -ne 0 || $HAS_ERROR -ne 0 ]]; then
            if [[ -s "artifacts/${COMMENT_ID}/result.md" ]]; then
              echo "Warning: Pi exited with code ${EXIT_CODE} or reported errorMessage, but result.md was generated."
              exit 0
            else
              echo "Pi execution failed; marking step as failed." >&2
              exit 1
            fi
          fi

      - name: 推送结果
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update results for issue #${{ env.ISSUE_NUMBER }}"
          fi
          git push origin "issue-${{ env.ISSUE_NUMBER }}" --force

      - name: 任务失败处理
        if: failure() && steps.pi_task.conclusion == 'failure'
        uses: jeffsia-blacksmith/altShiftClawToolkit/actions/error-handler-action@v1
        with:
          output_file: artifacts/${{ env.COMMENT_ID }}/error.log
          result_file: artifacts/${{ env.COMMENT_ID }}/result.md

      - name: 执行结果回报
        if: always()
        uses: jeffsia-blacksmith/altShiftClawToolkit/actions/update-comment-action@v1
        with:
          issue_number: ${{ env.ISSUE_NUMBER }}
          comment_id: ${{ env.COMMENT_ID }}
          message_file: artifacts/${{ env.COMMENT_ID }}/result.md
