name: "Error Handler"
description: "Extracts errors from execution and appends to result"
inputs:
  output_file:
    description: "File containing error logs"
    required: false
    default: "error.log"
  result_file:
    description: "File to append error summary to"
    required: false
    default: "result.md"
runs:
  using: "composite"
  steps:
    - name: Check for errors
      run: |
        OUTPUT_FILE="${{ inputs.output_file }}"
        RESULT_FILE="${{ inputs.result_file }}"
        if [ -s "$OUTPUT_FILE" ]; then
          echo -e "\n\n### ⚠️ Execution Notice\n" >> "$RESULT_FILE"
          cat "$OUTPUT_FILE" >> "$RESULT_FILE"
          echo "Errors appended to result."
        else
          echo "No errors found."
        fi
      shell: bash
